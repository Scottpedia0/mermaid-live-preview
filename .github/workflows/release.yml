name: Release VS Code Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build, package, publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-pass-3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloud-pass-3/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package .vsix
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p /tmp/artifacts
          npx @vscode/vsce package --no-dependencies --out /tmp/artifacts
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          VSIX_FILE="/tmp/artifacts/diagram-preview-tool-${{ steps.package.outputs.version }}.vsix"
          if [ -n "${VSCE_PAT}" ]; then
            npx @vscode/vsce publish --packagePath "$VSIX_FILE"
          else
            echo "::warning::VSCE_PAT is not set. Skipping Marketplace publish."
          fi

      - name: Attach .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/artifacts/diagram-preview-tool-${{ steps.package.outputs.version }}.vsix
          generate_release_notes: true

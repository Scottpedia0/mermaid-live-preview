name: Release VS Code Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build, package, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloud-pass-3/package-lock.json

      - name: Install dependencies
        working-directory: cloud-pass-3
        run: npm ci

      - name: Build extension
        working-directory: cloud-pass-3
        run: npm run build

      - name: Package .vsix
        id: package
        working-directory: cloud-pass-3
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p ./artifacts
          npx @vscode/vsce package --no-dependencies --out ./artifacts
          echo "package_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        working-directory: cloud-pass-3
        run: |
          VSIX_FILE=$(ls ./artifacts/diagram-preview-tool-${{ steps.package.outputs.package_version }}.vsix)
          npx @vscode/vsce publish --packagePath "$VSIX_FILE"

      - name: Attach .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cloud-pass-3/artifacts/diagram-preview-tool-${{ steps.package.outputs.package_version }}.vsix
          generate_release_notes: true
